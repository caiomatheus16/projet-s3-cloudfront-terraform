name: Deploy to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TERRAFORM_DIR: terraform/environments/production

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Get Bucket Name from tfvars
        id: bucket
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          BUCKET_NAME=$(grep 'bucket_name' terraform.tfvars | cut -d '=' -f2 | tr -d ' "')
          echo "name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Sync files to S3
        run: |
          aws s3 sync src/ s3://${{ steps.bucket.outputs.name }}/ \
            --exclude ".*" \
            --delete

      - name: Get CloudFront Distribution ID
        id: cloudfront
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?Id=='S3-${{ steps.bucket.outputs.name }}']].Id" \
            --output text)
          echo "id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront Cache
        if: steps.cloudfront.outputs.id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cloudfront.outputs.id }} \
            --paths "/*"

      - name: Deploy Summary
        run: |
          echo "✅ Deploy concluído!"
          echo "📦 Arquivos sincronizados para S3"
          echo "🔄 Cache do CloudFront invalidado"
