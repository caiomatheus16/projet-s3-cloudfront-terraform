name: Deploy to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'terraform/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TERRAFORM_DIR: terraform/environments/production

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.0.0

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve

      - name: Get Bucket Name
        id: bucket
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: echo "name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT

      - name: Sync files to S3
        run: |
          aws s3 sync src/ s3://${{ steps.bucket.outputs.name }}/ \
            --exclude ".*" \
            --delete

      - name: Get CloudFront Distribution ID
        id: cloudfront
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?Id=='S3-${{ steps.bucket.outputs.name }}']].Id" \
            --output text)
          echo "id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront Cache
        if: steps.cloudfront.outputs.id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cloudfront.outputs.id }} \
            --paths "/*"

      - name: Deploy Summary
        run: |
          echo "✅ Deploy concluído!"
          echo "🌐 CloudFront URL: $(cd ${{ env.TERRAFORM_DIR }} && terraform output -raw cloudfront_url)"
